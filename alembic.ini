# Alembic configuration for thermal-sentry.
# The DB URL is taken from TS_DB_URL at runtime (see alembic/env.py); the value
# here is only a fallback for offline `alembic` invocations.

[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = sqlite:///captures/thermal_sentry.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
