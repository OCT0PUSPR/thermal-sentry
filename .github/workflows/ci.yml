name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies (no hardware, no torch/training weights)
        run: |
          python -m pip install --upgrade pip
          # Core + dev deps only. Pi/hardware libs and torch (training) are
          # intentionally NOT installed -- CI runs the numpy-only import path.
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Verify package imports WITHOUT torch (numpy-only path)
        run: |
          python -c "import sys; assert 'torch' not in sys.modules"
          python -c "import thermalsentry; print('thermalsentry', thermalsentry.__version__)"
          python -c "import thermalsentry.ml; print('ml import-guarded OK (no torch)')"
          python -c "import thermalsentry.sensors.mlx90640 as m; print('mlx import-guarded OK')"

      - name: Ruff lint
        run: ruff check thermalsentry tests scripts

      - name: Mypy type-check
        run: mypy thermalsentry

      - name: Bandit security scan
        run: bandit -c pyproject.toml -r thermalsentry

      - name: Compile all sources
        run: python -m compileall thermalsentry tests scripts

      - name: Alembic migrations apply to a fresh DB
        env:
          TS_DB_URL: "sqlite:///ci_migrations.db"
        run: |
          alembic upgrade head
          alembic downgrade base
          rm -f ci_migrations.db

      - name: Run tests + coverage (>= 80% on thermalsentry core)
        run: |
          pytest -q --cov=thermalsentry --cov-report=term-missing --cov-fail-under=80

      - name: Smoke-test the simulate pipeline (headless, 10 frames)
        run: |
          python -m thermalsentry.cli run --source simulate --frames 10 --fps 50
